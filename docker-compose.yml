services:
  postgres:
    image: postgres:16-alpine
    container_name: supportops-postgres
    environment:
      POSTGRES_DB: supportops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - supportops-postgres-data:/var/lib/postgresql/data

volumes:
  supportops-postgres-data:
