spring:
  application:
    name: supportops-backend
  profiles:
    default: dev
  datasource:
    url: ${DB_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/supportops}}
    username: ${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:postgres}}
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    show-sql: false

server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  security:
    jwt-secret: ${JWT_SECRET:${APP_JWT_SECRET:supportops-super-secret-jwt-key-for-local-development-only}}
    jwt-expiration-millis: ${JWT_EXPIRATION_MILLIS:${APP_JWT_EXPIRATION_MILLIS:86400000}}
  cors:
    allowed-origins: ${FRONTEND_ORIGIN:${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}}
  demo:
    enabled: ${DEMO_MODE:false}

logging:
  level:
    root: INFO
    org.springframework.security: INFO
